# Uses direct deployment engine (CLI 0.279+). State: .databricks/bundle/<target>/resources.json
# https://docs.databricks.com/gcp/en/dev-tools/bundles/direct
bundle:
  name: nemweb-lab
  databricks_cli_version: ">= 0.283.0"

# Build wheel and copy to artifacts/latest
artifacts:
  nemweb_datasource:
    type: whl
    path: "./nemweb-data-source"
    build: "rm -f dist/*.whl && uv build --wheel --out-dir dist && mkdir -p ../databricks-nemweb-lab/artifacts ../databricks-nemweb-ml-lab/artifacts && cp dist/nemweb_datasource-*.whl ../databricks-nemweb-lab/artifacts/ && cp dist/nemweb_datasource-*.whl ../databricks-nemweb-ml-lab/artifacts/"

variables:
  # NEMWEB Lab configuration
  project_name:
    description: "Name of the NEMWEB solution accelerator lab"
    default: "nemweb-lab"

  # Unity Catalog configuration
  catalog:
    description: "Unity Catalog catalog name"
    default: "workspace"

  schema:
    description: "Unity Catalog schema name"
    default: "nemweb_lab"

  # Environment for deployment paths
  environment:
    description: "Deployment environment (dev, staging, prod)"
    default: "dev"

# Include files needed for the lab, exclude build artifacts
sync:
  include:
    - "nemweb-data-source/*.py"
    - "databricks-nemweb-lab/pipelines/**"
    - "databricks-nemweb-lab/exercises/**"
    - "databricks-nemweb-lab/solutions/**"
    - "databricks-nemweb-lab/artifacts/**"
    - "databricks-nemweb-lab/workshops/**"
    - "databricks-nemweb-ml-lab/**"
  exclude:
    - "nemweb-data-source/.venv/**"
    - "nemweb-data-source/__pycache__/**"
    - "nemweb-data-source/*.egg-info/**"
    - "nemweb-data-source/build/**"
    - "nemweb-data-source/dist/**"
    - "nemweb-data-source/tests/**"
    - "**/.pytest_cache/**"
    - "**/__pycache__/**"

targets:
  dev:
    default: true
    mode: development
    # Uses default profile from ~/.databrickscfg
    # Override with: databricks bundle deploy --profile <profile_name>

  prod:
    mode: production
    # Configure for production workspace before deploying

resources:
  # NEMWEB Lakeflow Declarative Pipeline (basic demo)
  pipelines:
    nemweb_pipeline:
      name: "${var.project_name}-pipeline-${var.environment}"
      serverless: true
      catalog: "${var.catalog}"
      schema: "${var.schema}"
      libraries:
        - notebook:
            path: ${workspace.file_path}/databricks-nemweb-lab/pipelines/nemweb_pipeline.py
      environment:
        dependencies:
          - ${workspace.file_path}/databricks-nemweb-lab/artifacts/nemweb_datasource-2.11.0-py3-none-any.whl
      configuration:
        bundle.sourcePath: ${workspace.file_path}/databricks-nemweb-lab/pipelines

    # Full NEMWEB MMS Pipeline - streams from extracted CSV files
    nemweb_mms_pipeline:
      name: "${var.project_name}-mms-pipeline-${var.environment}"
      serverless: true
      catalog: "${var.catalog}"
      schema: "${var.schema}"
      libraries:
        - notebook:
            path: ${workspace.file_path}/databricks-nemweb-lab/pipelines/nemweb_mms_pipeline
      configuration:
        bundle.sourcePath: ${workspace.file_path}/databricks-nemweb-lab/pipelines
        pipeline.catalog: "${var.catalog}"
        pipeline.schema: "${var.schema}"

    # ML Workshop Pipeline - simplified bronze/silver/gold for ML workshops
    nemweb_ml_pipeline:
      name: "${var.project_name}-ml-pipeline-${var.environment}"
      serverless: true
      catalog: "${var.catalog}"
      schema: "ml_workshops"
      libraries:
        - notebook:
            path: ${workspace.file_path}/databricks-nemweb-ml-lab/pipelines/nemweb_ml_pipeline.py
      configuration:
        bundle.sourcePath: ${workspace.file_path}/databricks-nemweb-ml-lab/pipelines
        pipeline.catalog: "${var.catalog}"
        pipeline.schema: "ml_workshops"

    # Streaming Pipeline - live NEMWEB + BOM weather for ML workshops
    nemweb_streaming_pipeline:
      name: "${var.project_name}-streaming-pipeline-${var.environment}"
      serverless: true
      catalog: "${var.catalog}"
      schema: "ml_workshops"
      libraries:
        - notebook:
            path: ${workspace.file_path}/databricks-nemweb-ml-lab/pipelines/nemweb_streaming_pipeline.py
      environment:
        dependencies:
          - ${workspace.file_path}/databricks-nemweb-ml-lab/artifacts/nemweb_datasource-2.11.0-py3-none-any.whl
      configuration:
        bundle.sourcePath: ${workspace.file_path}/databricks-nemweb-ml-lab/pipelines
        pipeline.catalog: "${var.catalog}"
        pipeline.schema: "ml_workshops"

    # Prediction Pipeline - scores silver data with registered UC models
    nemweb_prediction_pipeline:
      name: "${var.project_name}-prediction-pipeline-${var.environment}"
      serverless: true
      catalog: "${var.catalog}"
      schema: "ml_workshops"
      libraries:
        - notebook:
            path: ${workspace.file_path}/databricks-nemweb-ml-lab/pipelines/nemweb_prediction_pipeline.py
        - file:
            path: ${workspace.file_path}/databricks-nemweb-ml-lab/pipelines/ml_features.py
      environment:
        dependencies:
          - ${workspace.file_path}/databricks-nemweb-ml-lab/artifacts/nemweb_datasource-2.11.0-py3-none-any.whl
          - xgboost
      configuration:
        bundle.sourcePath: ${workspace.file_path}/databricks-nemweb-ml-lab/pipelines
        pipeline.catalog: "${var.catalog}"
        pipeline.schema: "ml_workshops"

  jobs:
    nemweb_lab_workflow:
      name: "${var.project_name} - Lab Exercises [${var.environment}]"
      tasks:
        - task_key: setup_validation
          notebook_task:
            notebook_path: ./databricks-nemweb-lab/exercises/00_setup_and_validation.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              include_current: "false"

        - task_key: custom_source
          depends_on:
            - task_key: setup_validation
          notebook_task:
            notebook_path: ./databricks-nemweb-lab/exercises/01_custom_source_exercise.py

        - task_key: lakeflow_pipeline
          depends_on:
            - task_key: custom_source
          notebook_task:
            notebook_path: ./databricks-nemweb-lab/exercises/02_lakeflow_pipeline.py

        - task_key: cluster_sizing
          depends_on:
            - task_key: lakeflow_pipeline
          notebook_task:
            notebook_path: ./databricks-nemweb-lab/exercises/03a_cluster_sizing_exercise.py

        - task_key: optimization_comparison
          depends_on:
            - task_key: lakeflow_pipeline
          notebook_task:
            notebook_path: ./databricks-nemweb-lab/exercises/03b_optimization_comparison.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"

    # Pipeline refresh job - triggers the Lakeflow pipeline
    nemweb_pipeline_job:
      name: "${var.project_name} - Pipeline Refresh [${var.environment}]"
      tasks:
        - task_key: refresh_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.nemweb_pipeline.id}

    # Solution workflow for instructors
    nemweb_lab_solutions:
      name: "${var.project_name} - Solutions [${var.environment}]"
      tasks:
        - task_key: setup_validation
          notebook_task:
            notebook_path: ./databricks-nemweb-lab/exercises/00_setup_and_validation.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              include_current: "false"

        - task_key: custom_source_solution
          depends_on:
            - task_key: setup_validation
          notebook_task:
            notebook_path: ./databricks-nemweb-lab/solutions/01_custom_source_solution.ipynb

        - task_key: lakeflow_pipeline_solution
          depends_on:
            - task_key: custom_source_solution
          notebook_task:
            notebook_path: ./databricks-nemweb-lab/solutions/02_lakeflow_pipeline_solution.ipynb

        - task_key: optimization_solution
          depends_on:
            - task_key: lakeflow_pipeline_solution
          notebook_task:
            notebook_path: ./databricks-nemweb-lab/solutions/03b_optimization_comparison_solution.ipynb
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"

    # ML Workshops for Load Forecasting and Market Modelling teams
    ml_workshops:
      name: "${var.project_name} - ML Workshops [${var.environment}]"
      tasks:
        - task_key: workshop_01_pipelines
          environment_key: serverless_with_deps
          notebook_task:
            notebook_path: ./databricks-nemweb-lab/workshops/01_platform_and_pipelines.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "ml_workshops"

        - task_key: workshop_02_mlflow
          environment_key: serverless_with_deps
          depends_on:
            - task_key: workshop_01_pipelines
          notebook_task:
            notebook_path: ./databricks-nemweb-lab/workshops/02_ml_workflows_mlflow.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "ml_workshops"

        - task_key: workshop_03_serving
          environment_key: serverless_with_deps
          depends_on:
            - task_key: workshop_02_mlflow
          notebook_task:
            notebook_path: ./databricks-nemweb-lab/workshops/03_serving_and_monitoring.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "ml_workshops"

        - task_key: workshop_04_advanced
          environment_key: serverless_with_deps
          depends_on:
            - task_key: workshop_03_serving
          notebook_task:
            notebook_path: ./databricks-nemweb-lab/workshops/04_advanced_ml_genai.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "ml_workshops"
      environments:
        - environment_key: serverless_with_deps
          spec:
            environment_version: "4"
            dependencies:
              - ${workspace.file_path}/databricks-nemweb-lab/artifacts/nemweb_datasource-2.11.0-py3-none-any.whl
              - xgboost
              - lightgbm
              - prophet

    # Workshop data setup - runs the full MMS pipeline
    workshop_data_setup:
      name: "${var.project_name} - Workshop Data Setup [${var.environment}]"
      tasks:
        - task_key: setup_schema
          environment_key: serverless_with_wheel
          notebook_task:
            notebook_path: ./databricks-nemweb-lab/workshops/00_workshop_data_setup.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "ml_workshops"
              days_history: "30"

        - task_key: run_mms_pipeline
          depends_on:
            - task_key: setup_schema
          pipeline_task:
            pipeline_id: ${resources.pipelines.nemweb_mms_pipeline.id}
            full_refresh: true
      environments:
        - environment_key: serverless_with_wheel
          spec:
            environment_version: "4"
            dependencies:
              - ${workspace.file_path}/databricks-nemweb-lab/artifacts/nemweb_datasource-2.11.0-py3-none-any.whl

    # MMS Pipeline refresh job
    nemweb_mms_pipeline_job:
      name: "${var.project_name} - MMS Pipeline Refresh [${var.environment}]"
      tasks:
        - task_key: refresh_mms_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.nemweb_mms_pipeline.id}

    # ML Workshop - Data Setup (run before the workshop)
    ml_workshop_data_setup:
      name: "${var.project_name} - ML Workshop Data Setup [${var.environment}]"
      tasks:
        - task_key: setup_schema_and_data
          environment_key: serverless_with_wheel
          notebook_task:
            notebook_path: ./databricks-nemweb-ml-lab/workshops/00_data_setup.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "ml_workshops"
              days_history: "30"

        - task_key: run_ml_pipeline
          depends_on:
            - task_key: setup_schema_and_data
          pipeline_task:
            pipeline_id: ${resources.pipelines.nemweb_ml_pipeline.id}
            full_refresh: true
      environments:
        - environment_key: serverless_with_wheel
          spec:
            environment_version: "4"
            dependencies:
              - ${workspace.file_path}/databricks-nemweb-ml-lab/artifacts/nemweb_datasource-2.11.0-py3-none-any.whl

    # ML Workshop - The workshop notebook itself
    ml_workshop:
      name: "${var.project_name} - ML Workshop [${var.environment}]"
      tasks:
        - task_key: run_workshop
          environment_key: serverless_ml
          notebook_task:
            notebook_path: ./databricks-nemweb-ml-lab/workshops/01_ml_workshop.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "ml_workshops"
      environments:
        - environment_key: serverless_ml
          spec:
            environment_version: "4"
            dependencies:
              - ${workspace.file_path}/databricks-nemweb-ml-lab/artifacts/nemweb_datasource-2.11.0-py3-none-any.whl
              - xgboost
              - lightgbm

    # ML Pipeline refresh job
    nemweb_ml_pipeline_job:
      name: "${var.project_name} - ML Pipeline Refresh [${var.environment}]"
      tasks:
        - task_key: refresh_ml_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.nemweb_ml_pipeline.id}

    # Streaming Pipeline refresh job
    streaming_pipeline_job:
      name: "${var.project_name} - Streaming Pipeline Refresh [${var.environment}]"
      tasks:
        - task_key: refresh_streaming_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.nemweb_streaming_pipeline.id}

    # Load Forecast Workshop (for Load Forecasting team)
    load_forecast_workshop:
      name: "${var.project_name} - Load Forecast Workshop [${var.environment}]"
      tasks:
        - task_key: run_workshop
          environment_key: serverless_ml
          notebook_task:
            notebook_path: ./databricks-nemweb-ml-lab/workshops/02_load_forecast_workshop.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "ml_workshops"
      environments:
        - environment_key: serverless_ml
          spec:
            environment_version: "4"
            dependencies:
              - ${workspace.file_path}/databricks-nemweb-ml-lab/artifacts/nemweb_datasource-2.11.0-py3-none-any.whl
              - xgboost

    # Market Modelling Workshop (for Market Modelling team)
    market_modelling_workshop:
      name: "${var.project_name} - Market Modelling Workshop [${var.environment}]"
      tasks:
        - task_key: run_workshop
          environment_key: serverless_ml
          notebook_task:
            notebook_path: ./databricks-nemweb-ml-lab/workshops/03_market_modelling_workshop.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "ml_workshops"
      environments:
        - environment_key: serverless_ml
          spec:
            environment_version: "4"
            dependencies:
              - ${workspace.file_path}/databricks-nemweb-ml-lab/artifacts/nemweb_datasource-2.11.0-py3-none-any.whl
              - xgboost

    # Prediction Pipeline refresh - scores silver data with registered UC models
    prediction_pipeline_job:
      name: "${var.project_name} - Prediction Pipeline Refresh [${var.environment}]"
      tasks:
        - task_key: refresh_predictions
          pipeline_task:
            pipeline_id: ${resources.pipelines.nemweb_prediction_pipeline.id}

    # E2E Demo - trains models then scores data in one job
    e2e_demo:
      name: "${var.project_name} - E2E Demo [${var.environment}]"
      tasks:
        - task_key: train_load_forecast
          environment_key: serverless_ml
          notebook_task:
            notebook_path: ./databricks-nemweb-ml-lab/workshops/02_load_forecast_workshop.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "ml_workshops"
        - task_key: train_price_forecast
          environment_key: serverless_ml
          notebook_task:
            notebook_path: ./databricks-nemweb-ml-lab/workshops/03_market_modelling_workshop.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "ml_workshops"
        - task_key: refresh_predictions
          depends_on:
            - task_key: train_load_forecast
            - task_key: train_price_forecast
          pipeline_task:
            pipeline_id: ${resources.pipelines.nemweb_prediction_pipeline.id}
      environments:
        - environment_key: serverless_ml
          spec:
            environment_version: "4"
            dependencies:
              - ${workspace.file_path}/databricks-nemweb-ml-lab/artifacts/nemweb_datasource-2.11.0-py3-none-any.whl
              - xgboost

# For more options and schema, see: https://docs.databricks.com/aws/en/dev-tools/bundles/settings

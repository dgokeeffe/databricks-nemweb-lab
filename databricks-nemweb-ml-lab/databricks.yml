# NEMWEB ML Lab - Databricks Asset Bundle
#
# Load Forecasting & Market Modelling workshops using live AEMO NEMWEB data.
# Follows the Lakeflow Pipelines Python project structure:
# https://github.com/databricks/bundle-examples/tree/main/lakeflow_pipelines_python
#
# Deploy: cd databricks-nemweb-ml-lab && databricks bundle deploy --profile daveok --var="environment=dev"
# First deploy (no state): DATABRICKS_BUNDLE_ENGINE=direct databricks bundle deploy -t dev

bundle:
  name: nemweb-ml-lab
  databricks_cli_version: ">= 0.283.0"

include:
  - resources/*.yml

artifacts:
  nemweb_datasource:
    type: whl
    path: "../nemweb-data-source"
    build: "cd ../nemweb-data-source && rm -f dist/*.whl && uv build --wheel --out-dir dist && mkdir -p ../databricks-nemweb-ml-lab/artifacts && cp dist/nemweb_datasource-*.whl ../databricks-nemweb-ml-lab/artifacts/"

variables:
  project_name:
    description: "NEMWEB ML Lab name"
    default: "nemweb-ml-lab"
  catalog:
    description: "Unity Catalog catalog name"
    default: "daveok"
  schema:
    description: "Schema for ML workshops (use ml_workshops)"
    default: "ml_workshops"
  environment:
    description: "Deployment environment (dev, staging, prod)"
    default: "dev"
  warehouse_id:
    description: "SQL warehouse ID used by the Dash app"
    default: "e4082fdb7ea19a15"

targets:
  dev:
    default: true
    mode: development
    workspace:
      root_path: /Workspace/Shared/nemweb-ml-lab/${workspace.current_user.userName}/dev
  prod:
    mode: production

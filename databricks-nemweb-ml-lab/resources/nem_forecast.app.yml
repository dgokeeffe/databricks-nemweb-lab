resources:
  apps:
    nem_forecast:
      name: "nem-forecast-${var.environment}"
      description: "NEM Forecast dashboard for load and price predictions"
      source_code_path: ../app
      resources:
        - name: "sql-warehouse"
          sql_warehouse:
            id: "${var.warehouse_id}"
            permission: "CAN_USE"
      config:
        command:
          - gunicorn
          - app:server
          - --bind
          - "0.0.0.0:8000"
          - --workers
          - "2"
        env:
          - name: DATABRICKS_WAREHOUSE_ID
            value_from: "sql-warehouse"
          - name: NEMWEB_CATALOG
            value: "${var.catalog}"
          - name: NEMWEB_SCHEMA
            value: "${var.schema}"

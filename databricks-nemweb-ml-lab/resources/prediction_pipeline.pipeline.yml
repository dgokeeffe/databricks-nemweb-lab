# NEMWEB Prediction Pipeline
# Loads registered UC champion models (from workshops) and scores silver data
# to produce demand_predictions and price_predictions tables for the Dash app.

resources:
  pipelines:
    nemweb_prediction_pipeline:
      name: "${var.project_name}-prediction-pipeline-${var.environment}"
      serverless: true
      catalog: "${var.catalog}"
      schema: "${var.schema}"
      root_path: "../src/prediction_pipeline"

      libraries:
        - glob:
            include: ../src/prediction_pipeline/transformations/**

      environment:
        dependencies:
          - ${workspace.root_path}/artifacts/.internal/nemweb_datasource-2.12.1-py3-none-any.whl
          - xgboost

      configuration:
        pipeline.catalog: "${var.catalog}"
        pipeline.schema: "${var.schema}"
